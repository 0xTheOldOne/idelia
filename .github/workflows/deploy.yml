name: Déploiement GitHub Pages

on:
  # Déploie à chaque push sur main
  push:
    branches: [main]
  # Permet aussi un déclenchement manuel depuis l'onglet Actions
  workflow_dispatch:

# Permissions minimales requises par le déploiement Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on n'annule pas un déploiement en cours
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Construire le site
        run: npm run build

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Téléverser l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur Pages
        id: deployment
        uses: actions/deploy-pages@v4
